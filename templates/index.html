<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Учёт шагов</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='store.css') }}">
</head>
<body>
    <header>
        <h1>Учёт количества шагов</h1>
    </header>

    <main>
        <section class="add-form">
            <h2>Добавить запись</h2>
            <input type="number" id="steps-input" placeholder="Количество шагов" min="0">
            <input type="date" id="date-input">
            <button id="add-button">Добавить</button>
        </section>

        <section class="total">
            <p>Суммарное количество шагов: <span id="total-steps">{{ total_steps }}</span></p>
        </section>

        <section class="records">
            <h2>История</h2>
            <ul id="records-list">
                {% for record in records %}
                <li>{{ record.date }} — {{ record.steps }} шагов</li>
                {% endfor %}
            </ul>
        </section>

        <button id="clear-button">Clear</button>
    </main>

    <script src="{{ url_for('static', filename='update.js') }}"></script>
</body>
</html>
